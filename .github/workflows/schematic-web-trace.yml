name: Schematic Web Trace

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - rtl/**
      - schematics/**
  workflow_dispatch:
    inputs:
      top_module:
        description: Top module name
        required: true
        default: generic_module
      create_release:
        description: Publish artifacts to a release tag
        required: true
        type: boolean
        default: true
      release_tag:
        description: Release tag to create/update
        required: true
        default: schematic-latest

permissions:
  contents: write

jobs:
  build-web-trace:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y yosys nodejs npm
          sudo npm install -g netlistsvg

      - name: Generate web trace artifacts
        shell: pwsh
        env:
          TOP_MODULE: ${{ inputs.top_module || 'generic_module' }}
        run: |
          ./schematics/web_trace.ps1 -Top "$env:TOP_MODULE" -OutDir "schematics/web_trace" -NoOpen

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-trace-${{ inputs.top_module || 'generic_module' }}
          path: schematics/web_trace/

      - name: Publish release assets
        if: ${{ github.event_name == 'pull_request' || inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || 'schematic-latest' }}
          name: Web Trace (${{ inputs.top_module || 'generic_module' }})
          prerelease: true
          files: |
            schematics/web_trace/${{ inputs.top_module || 'generic_module' }}.synth.json
            schematics/web_trace/${{ inputs.top_module || 'generic_module' }}.synth.svg
            schematics/web_trace/${{ inputs.top_module || 'generic_module' }}.web_trace.html
