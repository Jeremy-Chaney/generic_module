name: PR Verilator Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'rtl/**'
      - 'lint/**'
      - '.github/workflows/pr-verilator-lint.yml'

jobs:
  verilator-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run Verilator lint
        shell: bash
        run: |
          set -euo pipefail
          chmod +x lint/run_verilator_lint.sh
          lint/run_verilator_lint.sh
